<!DOCTYPE html><html lang="no"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MotorFeed.no</title></head><body><main><h1>MotorFeed.no</h1><div id="newsGrid"></div></main>
<script>
(function () {
  function escapeHtml(value = "") {
    return String(value).replace(/[&<>"']/g, char => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[char]));
  }

  function timeAgo(dateString) {
    const date = new Date(dateString || Date.now());
    if (Number.isNaN(date.getTime())) return "Nylig";
    const diff = Math.max(0, Date.now() - date.getTime());
    const hours = Math.floor(diff / 36e5);
    if (hours < 1) return "Akkurat nå";
    if (hours < 24) return `${hours} timer siden`;
    const days = Math.floor(hours / 24);
    return `${days} dager siden`;
  }

  function tagClass(category = "") {
    const c = category.toLowerCase();
    if (c.includes("elbil")) return "green";
    if (c.includes("mc") || c.includes("motorsykkel")) return "orange";
    if (c.includes("teknologi")) return "blue";
    return "";
  }

  function renderSmallCards(items) {
    const grid = document.querySelector("#newsGrid");
    if (!grid || !items.length) return;

    grid.innerHTML = items.slice(0, 4).map(item => `
      <article class="small-card">
        <img src="${escapeHtml(item.image || "https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=500&q=80")}" alt="${escapeHtml(item.title)}" loading="lazy">
        <div class="small-card-body">
          <span class="tag ${tagClass(item.category)}">${escapeHtml(item.category || item.source || "Nyheter")}</span>
          <h3>${escapeHtml(item.title)}</h3>
          <small>${escapeHtml(item.source || "RSS")} · ${timeAgo(item.pubDate)}</small>
        </div>
      </article>
    `).join("");
  }

  function renderSideStories(items) {
    const side = document.querySelector("#trendingStories");
    if (!side || !items.length) return;

    side.innerHTML = items.slice(0, 3).map(item => `
      <article class="side-card">
        <img src="${escapeHtml(item.image || "https://images.unsplash.com/photo-1593941707882-a5bba14938c7?auto=format&fit=crop&w=500&q=80")}" alt="${escapeHtml(item.title)}" loading="lazy">
        <div class="side-body">
          <span class="tag ${tagClass(item.category)}">${escapeHtml(item.category || "Nyheter")}</span>
          <h3>${escapeHtml(item.title)}</h3>
          <small>${timeAgo(item.pubDate)}</small>
        </div>
      </article>
    `).join("");
  }

  async function loadMotorFeedNews() {
    try {
      const response = await fetch("/.netlify/functions/fetch-news", { cache: "no-store" });
      if (!response.ok) return;
      const data = await response.json();
      const items = Array.isArray(data.items) ? data.items : [];
      if (!items.length) return;

      renderSmallCards(items);
      renderSideStories(items.slice(4));

      const lead = document.querySelector(".lead-card .image-overlay h2");
      const leadImg = document.querySelector(".lead-card img");
      const leadMeta = document.querySelector(".lead-card .meta");
      if (lead && items[0]) lead.textContent = items[0].title;
      if (leadImg && items[0]?.image) leadImg.src = items[0].image;
      if (leadMeta && items[0]) leadMeta.innerHTML = `<span>◷ ${timeAgo(items[0].pubDate)}</span><span>${escapeHtml(items[0].source || "RSS")}</span>`;
    } catch (error) {
      console.warn("MotorFeed RSS fallback aktiv:", error);
    }
  }

  loadMotorFeedNews();
})();
</script>

</body></html>
